# =====================================================
# Epic Green ERP - Application Configuration
# =====================================================

spring:
  application:
    name: epic-green-erp
    
  profiles:
    active: dev

  # ===================================================
  # DATABASE CONFIGURATION
  # ===================================================
  datasource:
    url: jdbc:mysql://localhost:3306/epic_green_db?useSSL=true&serverTimezone=Asia/Colombo&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # HikariCP Connection Pool
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: EpicGreenHikariCP
      auto-commit: true
      connection-test-query: SELECT 1

  # ===================================================
  # JPA / HIBERNATE CONFIGURATION
  # ===================================================
  jpa:
    hibernate:
      ddl-auto: validate  # Use Flyway for schema management
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
        query:
          in_clause_parameter_padding: true
        enable_lazy_load_no_trans: false
        
  # ===================================================
  # FLYWAY CONFIGURATION
  # ===================================================
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  # ===================================================
  # REDIS CONFIGURATION
  # ===================================================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 60000
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # ===================================================
  # CACHE CONFIGURATION
  # ===================================================
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 minutes in milliseconds
      cache-null-values: false
      use-key-prefix: true
      key-prefix: epic-green

  # ===================================================
  # RABBITMQ CONFIGURATION
  # ===================================================
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3

  # ===================================================
  # MAIL CONFIGURATION
  # ===================================================
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@epicgreen.lk}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ===================================================
  # JACKSON CONFIGURATION
  # ===================================================
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: Asia/Colombo

  # ===================================================
  # SERVLET / FILE UPLOAD
  # ===================================================
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

# =====================================================
# SERVER CONFIGURATION
# =====================================================
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# =====================================================
# LOGGING CONFIGURATION
# =====================================================
logging:
  level:
    root: INFO
    lk.epicgreen.erp: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/epic-green-erp.log
    max-size: 10MB
    max-history: 30

# =====================================================
# ACTUATOR CONFIGURATION
# =====================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true

# =====================================================
# SPRINGDOC / SWAGGER CONFIGURATION
# =====================================================
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  show-actuator: true

# =====================================================
# APPLICATION SPECIFIC CONFIGURATION
# =====================================================
app:
  name: Epic Green ERP
  version: 1.0.0
  description: Spice Production Factory ERP System
  
  # JWT Configuration
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 900000  # 15 minutes in milliseconds
    refresh-expiration: 604800000  # 7 days in milliseconds
    
  # Security Configuration
  security:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}
    bcrypt-strength: 10
    max-login-attempts: 5
    lockout-duration-minutes: 30
    
  # File Storage Configuration
  storage:
    location: ${STORAGE_LOCATION:./uploads}
    max-file-size: 10485760  # 10MB in bytes
    allowed-extensions: jpg,jpeg,png,pdf,xlsx,docx
    
  # Pagination Configuration
  pagination:
    default-page-size: 20
    max-page-size: 100
    
  # Business Configuration
  business:
    company-name: Epic Green Spice Company
    company-address: No. 123, Spice Street, Colombo 00700, Sri Lanka
    company-phone: +94 11 2345678
    company-email: info@epicgreen.lk
    company-tax-id: VAT-123456789
    currency: LKR
    timezone: Asia/Colombo
    
  # Notification Configuration
  notification:
    email-enabled: ${EMAIL_ENABLED:true}
    sms-enabled: ${SMS_ENABLED:false}
    sms-provider: ${SMS_PROVIDER:dialog}
    sms-api-key: ${SMS_API_KEY:}
    
  # Mobile Sync Configuration
  sync:
    enabled: true
    interval-minutes: 15
    batch-size: 100
    conflict-resolution: SERVER_WINS  # SERVER_WINS, CLIENT_WINS, MANUAL
    
  # Async Configuration
  async:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
    thread-name-prefix: epic-green-async-
    
  # Scheduler Configuration
  scheduler:
    enabled: true
    pool-size: 5

# =====================================================
# CORS CONFIGURATION
# =====================================================
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600
